version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # Las dependencias menores/patch llegan como un solo PR semanal;
      # los majors llegan separados para revisarse con calma.
      minor-y-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
